<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savana | by Корж</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #17212b; color: #fff; margin: 0; padding: 20px; }
    .auth { max-width: 340px; margin: 50px auto; padding: 20px; background: #1e2c3a; border-radius: 10px; }
    h2 { text-align: center; color: #3390ec; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: none; border-radius: 6px; background: #17212b; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 6px; background: #3390ec; color: #fff; font-weight: 600; cursor: pointer; }
    .error { color: #e53935; text-align: center; margin-bottom: 8px; }
    .switch { text-align: center; margin-top: 10px; color: #3390ec; text-decoration: none; display: block; }
  </style>
</head>
<body>
  {% if not user %}
  <div class="auth">
    <h2>🦁 Savana</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    {% if login %}
    <form method="POST" action="/login">
      <input name="username" placeholder="Логин" required>
      <input name="password" type="password" placeholder="Пароль" required>
      <button type="submit">Войти</button>
    </form>
    <a href="/register" class="switch">Нет аккаунта? Создать</a>
    {% else %}
    <form method="POST" action="/register">
      <input name="username" placeholder="Придумай логин" required>
      <input name="password" type="password" placeholder="Придумай пароль" required>
      <button type="submit">Зарегистрироваться</button>
    </form>
    <a href="/login" class="switch">Уже есть аккаунт? Войти</a>
    {% endif %}
  </div>
  {% else %}
  <div style="text-align: center; margin-top: 50px;">
    <h1>👋 Привет, {{ user.username }}!</h1>
    <p>Мессенджер работает!</p>
    <p>База: /tmp/savana.db</p>
    <a href="/logout" style="color: #3390ec;">Выйти</a>
  </div>
  {% endif %}
</body>
</html>
